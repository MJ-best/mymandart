name: mandarart_journey
description: Mandarart multi-platform app (Flutter)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.3.2
  uuid: ^4.4.2
  go_router: ^14.2.7
  supabase_flutter: ^2.8.0

  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/fixtures/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#8B5CF6"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  remove_alpha_ios: true

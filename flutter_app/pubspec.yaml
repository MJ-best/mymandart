name: mandarart_journey
description: Mandarart multi-platform app (Flutter)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.3.2
  uuid: ^4.4.2
  go_router: ^14.2.7

  # Only used for mobile features; safe on web as no-op
  share_plus: ^10.0.2
  screenshot: ^3.0.0
  gal: ^2.3.0

  # Cupertino icons for iOS style
  cupertino_icons: ^1.0.8
  responsive_builder: ^0.7.0
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#8B5CF6"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  remove_alpha_ios: true
